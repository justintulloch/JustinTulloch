name: Update profile card

on:
  schedule:
    # Every Monday at 13:00 UTC (9am US Eastern)
    - cron: '0 13 * * 1'
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev nlohmann-json3-dev

      - name: Compile profile_card
        run: g++ -std=c++17 -O2 src/profile_card.cpp -o profile_card -lcurl

      - name: Generate card
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_PAT }}
        run: |
          ./profile_card justintulloch "justintulloch/ephemeral-execution-engine,justintulloch/split-inference-grpc-demo,justintulloch/PyDrill" objectives.txt assets/activity-card.svg

      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/activity-card.svg
          git diff --staged --quiet || git commit -m "chore: update weekly profile card"
          git push
